<app-header />

<main class="min-h-screen flex items-center justify-center py-16 px-4"
      style="background-color: #1A2E20;">

  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-sm p-8">

      <div class="text-center mb-8">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4"
             style="background: linear-gradient(135deg, #1A2E20, #1E5C3A);">
          <span class="text-white font-bold text-lg">⚙</span>
        </div>
        <h1 class="text-2xl font-bold mb-1" style="color: #1A2E20;">Admin Portal</h1>
        <p class="text-sm" style="color: #1A2E20; opacity: 0.5;">Fixify Administration</p>
      </div>

      <!-- Hint -->
      <div class="mb-6 px-4 py-3 rounded-xl text-xs"
           style="background-color: #F2E8D9; color: #1A2E20;">
        <p class="font-medium mb-0.5">Demo credentials</p>
        <p>admin@fixify.com / admin123</p>
      </div>

      @if (error()) {
        <div class="mb-4 px-4 py-3 rounded-xl text-sm"
             style="background-color: #FEE2E2; color: #DC2626;">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1.5" style="color: #1A2E20;">Email</label>
          <input type="email"
                 [ngModel]="email()"
                 (ngModelChange)="email.set($event)"
                 name="email"
                 placeholder="admin@fixify.com"
                 required
                 class="w-full px-4 py-2.5 rounded-xl border text-sm outline-none"
                 style="border-color: #F2E8D9; color: #1A2E20;"
                 onfocus="this.style.borderColor='#1A2E20'"
                 onblur="this.style.borderColor='#F2E8D9'" />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium mb-1.5" style="color: #1A2E20;">Password</label>
          <input type="password"
                 [ngModel]="password()"
                 (ngModelChange)="password.set($event)"
                 name="password"
                 placeholder="••••••••"
                 required
                 class="w-full px-4 py-2.5 rounded-xl border text-sm outline-none"
                 style="border-color: #F2E8D9; color: #1A2E20;"
                 onfocus="this.style.borderColor='#1A2E20'"
                 onblur="this.style.borderColor='#F2E8D9'" />
        </div>

        <button type="submit"
                [disabled]="loading()"
                class="w-full py-3 rounded-xl font-semibold text-sm text-white transition-all disabled:opacity-60"
                style="background-color: #1A2E20;">
          @if (loading()) {
            <span>Signing in...</span>
          } @else {
            <span>Sign In</span>
          }
        </button>
      </form>

    </div>
  </div>
</main>
